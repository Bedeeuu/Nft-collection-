openapi: 3.1.0
info:
  title: GhostMind Replit GPT Gateway
  version: 0.1.0
  description: GPT Action schema for the temporary GhostMind Replit Gateway.
servers:
  - url: https://YOUR-REPLIT-APP-URL
    description: Replace with deployed Replit URL
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check gateway health
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  mode:
                    type: string
  /foundation/status:
    get:
      operationId: getFoundationStatus
      summary: Read GhostMind Foundation Pack status
      responses:
        '200':
          description: Foundation status
          content:
            application/json:
              schema:
                type: object
  /gpt/chat:
    post:
      operationId: ghostmindChat
      summary: Send a chat request through the GhostMind gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                model:
                  type: string
                temperature:
                  type: number
                  default: 0.2
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                          - system
                      content:
                        type: string
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
                    type: string
                  answer:
                    type: string
                  mode:
                    type: string
